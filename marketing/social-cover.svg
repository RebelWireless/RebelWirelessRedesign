<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="50%" stop-color="#0d1324"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="gridLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(59,130,246,0.08)"/>
      <stop offset="50%" stop-color="rgba(59,130,246,0.15)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>

  <!-- Network pattern -->
  <g stroke="url(#gridLine)" stroke-width="1" opacity="0.4">
    <line x1="0" y1="0" x2="200" y2="500"/>
    <line x1="200" y1="0" x2="400" y2="500"/>
    <line x1="400" y1="0" x2="600" y2="500"/>
    <line x1="600" y1="0" x2="800" y2="500"/>
    <line x1="800" y1="0" x2="1000" y2="500"/>
    <line x1="1000" y1="0" x2="1200" y2="500"/>
    <line x1="1200" y1="0" x2="1400" y2="500"/>
    <line x1="1400" y1="0" x2="1500" y2="500"/>
  </g>

  <!-- Bolt icon -->
  <g transform="translate(50, 100) scale(4)">
    <path d="M28 0 L8 42 L22 42 L14 76 L48 32 L32 32 L46 0 Z"
          fill="url(#boltGrad)" stroke="#2563eb" stroke-width="1"/>
  </g>

  <!-- Brand -->
  <text x="210" y="195" font-family="Inter, sans-serif"
        font-size="72" font-weight="800" fill="#f1f5f9" letter-spacing="-0.02em">REBEL WIRELESS</text>
  <text x="210" y="250" font-family="Inter, sans-serif"
        font-size="28" font-weight="500" fill="#94a3b8">Calgary's Independent Internet</text>

  <!-- Right-side stats -->
  <rect x="900" y="120" width="260" height="100" rx="12" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="1030" y="162" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#3b82f6">8 Plans</text>
  <text x="1030" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">$15 – $150/mo</text>

  <rect x="1180" y="120" width="260" height="100" rx="12" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="1310" y="162" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#22d3ee">O Contracts</text>
  <text x="1310" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">Month-to-month</text>

  <rect x="900" y="240" width="260" height="100" rx="12" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="1030" y="282" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#22c55e">Unlimited Data</text>
  <text x="1030" y="315" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">No caps, ever</text>

  <rect x="1180" y="240" width="260" height="100" rx="12" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="1310" y="282" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#fbbf24">Calgary Local</text>
  <text x="1310" y="315" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">Real people M-F 9-5</text>

  <!-- URL bar -->
  <rect x="210" y="310" width="400" height="40" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <text x="410" y="337" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#3b82f6">rebelwireless.ca</text>
</svg>
