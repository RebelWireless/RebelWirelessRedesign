  <text x="663" y="760" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#f1f5f9">$150</text>
  <text x="663" y="785" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">/mo</text>
